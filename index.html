<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Shoe & Gear Coach</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: #fff;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            max-width: 500px;
            margin: 0 auto;
        }
        h2 {
            text-align: center;
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin: 15px 0 5px;
            font-weight: bold;
        }
        input, select {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Shoe & Gear Coach</h2>
        <form id="recomendationForm">
            <label for="level">Nivel:</label>
            <select id="level" required>
                <option value="">Seleccionar</option>
                <option value="principiante">Principiante</option>
                <option value="intermedio">Intermedio</option>
                <option value="avanzado">Avanzado</option>
            </select>

            <label for="terrain">Terreno:</label>
            <select id="terrain" required>
                <option value="">Seleccionar</option>
                <option value="montaña">Montaña</option>
                <option value="bosque">Bosque</option>
                <option value="roca">Roca</option>
                <option value="mixto">Mixto</option>
            </select>

            <label for="budget">Presupuesto (MXN):</label>
            <select id="budget" required>
                <option value="">Seleccionar</option>
                <option value="menos2000">Menos de $2,000</option>
                <option value="2000-4000">$2,000 - $4,000</option>
                <option value="mas4000">Más de $4,000</option>
            </select>

            <label for="shoeSize">Talla de calzado:</label>
            <input type="number" id="shoeSize" min="36" max="47" required>

            <label for="objective">Objetivo:</label>
            <select id="objective" required>
                <option value="">Seleccionar</option>
                <option value="5K">5K</option>
                <option value="10K">10K</option>
                <option value="21K">21K</option>
                <option value="ultra">Ultra (50K+)</option>
            </select>

            <button type="button" onclick="recomendar()">Ver recomendación</button>
        </form>
    </div>
</body>
</html>
