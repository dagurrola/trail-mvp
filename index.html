<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Trail Shoe Coach</title>
<style>
body{font-family:Arial,Helvetica,sans-serif;background:#f4f4f4;margin:0;padding:20px}
.container{background:#fff;padding:25px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.1);max-width:500px;margin:0 auto}
h2{text-align:center;margin-bottom:20px}
p{font-size:0.95rem;color:#555;text-align:center;margin:-8px 0 22px;line-height:1.55}
label{display:block;margin:15px 0 5px;font-weight:bold}
input,select{width:100%;padding:10px;margin-bottom:15px;border:1px solid #ccc;border-radius:4px}
button,select#action{width:100%;padding:12px;background-color:#28a745;color:#fff;border:none;border-radius:4px;font-size:16px;cursor:pointer}
button:hover,select#action:hover{background-color:#218838}
.hidden{display:none}
ul{margin:0;padding-left:20px}
</style>
</head>
<body>
<div class="container">
<h2>Trail Shoe Coach</h2>
<p>Encuentra el par de tenis ideal para tu correr y 2 recomendaciones más al responder 5 preguntas sobre tu nivel de corredor, terreno donde lo usarás y tu presupuesto.</p>
<form id="recomendationForm">
<label for="level">¿Cuál es tu nivel?</label>
<select id="level" required>
<option value="">Seleccionar</option>
<option value="principiante">Principiante (0-6 meses, carreras 5-10K)</option>
<option value="intermedio">Intermedio (1-2 años, carreras hasta 21K)</option>
<option value="avanzado">Avanzado (2+ años, ultras y terreno técnico)</option>
</select>
<label for="terrain">En qué tipo de terreno lo usarás:</label>
<select id="terrain" required>
<option value="">Seleccionar</option>
<option value="montaña">Montaña</option>
<option value="bosque">Bosque</option>
<option value="roca">Roca</option>
<option value="mixto">Mixto/Variado</option>
</select>

<label for="budget">Cuál es tu presupuesto:</label>
<select id="budget" required>
<option value="">Seleccionar</option>
<option value="menos2000">Menos de $2,000</option>
<option value="2000-4000">$2,000 – $4,000</option>
<option value="mas4000">Más de $4,000</option>
</select>

<label for="objective">Cuál es tu objetivo:</label>
<select id="objective" required>
<option value="">Seleccionar</option>
<option value="entrenamiento">Entrenamiento</option>
<option value="competencia">Competencia</option>
</select>

<select id="objectiveSub" class="hidden" required></select>

<button type="button" onclick="recomendar()">Ver recomendación</button>
</form>
</div>
<script>
document.getElementById('objective').addEventListener('change', function(){
const sub=document.getElementById('objectiveSub');sub.innerHTML='';sub.classList.add('hidden');sub.removeAttribute('required');
if(this.value==='entrenamiento'){sub.innerHTML='<option value="">Seleccionar</option>'+'<option value="tecnica">Mejorar técnica</option>'+'<option value="distancia">Aumentar distancia</option>'+'<option value="velocidad">Velocidad</option>';sub.classList.remove('hidden');sub.setAttribute('required','');}
if(this.value==='competencia'){sub.innerHTML='<option value="">Seleccionar</option>'+'<option value="5K">5 K</option>'+'<option value="10K">10 K</option>'+'<option value="21K">21 K</option>'+'<option value="51Kplus">51 K+</option>';sub.classList.remove('hidden');sub.setAttribute('required','');}
});
function recomendar(){
  const terreno=document.getElementById('terrain').value;
  const presupuesto=document.getElementById('budget').value;
  const level=document.getElementById('level').value;
  const objMaj=document.getElementById('objective').value;
  const objSub=document.getElementById('objectiveSub').value;
  let objetivo=objSub||objMaj;
  if(!level||!terreno||!presupuesto||!objetivo){alert('Por favor completa todos los campos.');return}

  // REGLA 1: Terrain buckets
  const terrainBucket={
    montaña:'technical_trail',
    roca:'technical_trail',
    bosque:'mixed_trail',
    mixto:'mixed_trail'
  };
  const bucket=terrainBucket[terreno]||'mixed_trail';

  // Budget
  const maxMXN={'menos2000':1999,'2000-4000':4000,'mas4000':99999}[presupuesto]||4000;
  const tolerance={'menos2000':0.12,'2000-4000':0.15,'mas4000':0.20}[presupuesto]||0.15;
  const maxSoft=maxMXN===99999?99999:Math.round(maxMXN*(1+tolerance));

  function budgetBadge(z){
    if(z.precioNum<=maxMXN) return 'dentro';
    if(z.precioNum<=maxSoft) return 'subir';
    return 'fuera';
  }

  const catalogo=[
    {
      nombre:'Merrell Trail Glove 7',marca:'Merrell',precio:'$1,600 MXN',precioNum:1600,
      bucket:['mixed_trail','door_to_trail'],
      terrenoKeys:['mixto','bosque','montaña'],tags:['mixto','bosque'],terreno:'Mixto / Bosque',
      nivelKeys:['principiante'],objetivoKeys:['entrenamiento','tecnica','distancia'],
      rol:'ligero',shortReason:'Tu primer zapato de trail sin arriesgar mucho dinero.',
      subhead:'La más ligera y accesible para empezar.',
      copy:'Tu primer zapato de trail sin arriesgar mucho dinero. Suela funcional, zero-drop y un precio que no duele.',
      highlight:'Ideal si todavía no sabes cuánto te va a gustar el trail.',
      metricas:{amortiguacion:1,agarre:3,estabilidad:2},distancia:'Corta',
      link:'https://www.amazon.com.mx/s?k=Merrell+Trail+Glove+trail+running'
    },
    {
      nombre:'Salomon Sense Ride 5',marca:'Salomon',precio:'$1,900 MXN',precioNum:1900,
      bucket:['mixed_trail','door_to_trail'],
      terrenoKeys:['mixto','montaña','bosque'],tags:['mixto','versátil'],terreno:'Mixto / Sendero',
      nivelKeys:['principiante','intermedio'],objetivoKeys:['entrenamiento','tecnica','distancia','5K','10K'],
      rol:'versátil',shortReason:'Versátil y accesible para sendero mixto y bosque.',
      subhead:'La opción más versátil para empezar en senderos de bosque.',
      copy:'Buen equilibrio entre tracción y comodidad para terreno mixto. Funciona en senderos variados sin ser extremo en ninguna dirección — y a precio accesible.',
      highlight:'Ideal si quieres un zapato funcional sin complicarte la elección.',
      metricas:{amortiguacion:3,agarre:3,estabilidad:3},distancia:'Corta-Media',
      link:'https://www.amazon.com.mx/s?k=Salomon+Sense+Ride+5+trail'
    },
    {
      nombre:'Brooks Cascadia 17',marca:'Brooks',precio:'$2,200 MXN',precioNum:2200,
      bucket:['mixed_trail','technical_trail'],
      terrenoKeys:['mixto','bosque','montaña'],tags:['mixto','bosque','montaña'],terreno:'Mixto / Bosque',
      nivelKeys:['principiante','intermedio'],objetivoKeys:['entrenamiento','tecnica','distancia','5K','10K'],
      rol:'estabilidad',shortReason:'Versátil, estable y confiable para terreno variado.',
      subhead:'La más estable si quieres más protección en terreno variable.',
      copy:'Balance sólido entre protección, estabilidad y adaptabilidad para terreno variable, sin sentirse extremo en una sola dirección. La favorita de corredores que quieren confianza en el pie.',
      highlight:'Ideal si buscas un solo par para empezar o para cubrir la mayoría de tus rutas.',
      metricas:{amortiguacion:3,agarre:4,estabilidad:4},distancia:'Media-larga',
      link:'https://www.amazon.com.mx/s?k=Brooks+Cascadia+17+trail'
    },
    {
      nombre:'New Balance Fresh Foam Trail',marca:'New Balance',precio:'$2,500 MXN',precioNum:2500,
      bucket:['mixed_trail','door_to_trail'],
      terrenoKeys:['montaña','mixto','roca','bosque'],tags:['mixto','amortiguado','larga distancia'],terreno:'Larga distancia',
      nivelKeys:['intermedio'],objetivoKeys:['distancia','21K','51Kplus'],
      rol:'confort',shortReason:'Más amortiguación y confort para correr más tiempo.',
      subhead:'La más cómoda para acumular kilómetros sin fatiga.',
      copy:'Alta amortiguación para salidas largas. Reduce fatiga en distancias largas aunque no es la más precisa para terreno muy roto.',
      highlight:'Ideal si tu prioridad es comodidad antes que agresividad.',
      metricas:{amortiguacion:5,agarre:3,estabilidad:3},distancia:'Larga',
      link:'https://www.amazon.com.mx/s?k=New+Balance+Fresh+Foam+Trail+510'
    },
    {
      nombre:'Salomon Speedcross 6',marca:'Salomon',precio:'$2,800 MXN',precioNum:2800,
      bucket:['mud_soft_ground','technical_trail','mixed_trail'],
      terrenoKeys:['montaña','mixto','bosque'],tags:['barro','agarre alto','técnico'],terreno:'Barro / Terreno suelto',
      nivelKeys:['principiante','intermedio','avanzado'],objetivoKeys:['competencia','entrenamiento','5K','10K','21K'],
      rol:'agarre',shortReason:'Tracción agresiva para terreno suelto o húmedo.',
      subhead:'La mejor si corres en barro o terreno suelto.',
      copy:'El agarre más agresivo del grupo. Si tus rutas tienen lodo o tierra blanda, gana mucho en mordida y control sobre terreno complicado.',
      highlight:'Ideal si prefieres sentirte seguro en terreno difícil, aunque sea más específico.',
      metricas:{amortiguacion:3,agarre:5,estabilidad:3},distancia:'Corta-Media',
      link:'https://www.amazon.com.mx/s?k=Salomon+Speedcross+6'
    },
    {
      nombre:'Salomon Ultra Glide 2',marca:'Salomon',precio:'$3,100 MXN',precioNum:3100,
      bucket:['mixed_trail','door_to_trail'],
      terrenoKeys:['bosque','mixto'],tags:['mixto','amortiguado','versátil'],terreno:'Larga distancia / Versátil',
      nivelKeys:['intermedio','avanzado'],objetivoKeys:['distancia','21K','entrenamiento'],
      rol:'confort',shortReason:'Alta amortiguación y comodidad para distancias largas en terreno moderado.',
      subhead:'La más cómoda para correr más tiempo, pero sube tu presupuesto.',
      copy:'Alta amortiguación y versátil para terreno moderado. Más protectora bajo el pie en distancias largas. No es la más ágil en técnico, pero sí la más cómoda para acumular kilómetros.',
      highlight:'Considera que rebasa el rango de $2,000 — si puedes subir, vale la diferencia.',
      metricas:{amortiguacion:5,agarre:3,estabilidad:3},distancia:'Larga',
      link:'https://www.amazon.com.mx/s?k=Salomon+Ultra+Glide+2+trail'
    },
    {
      nombre:'Inov-8 Trailfly G 270',marca:'Inov-8',precio:'$3,200 MXN',precioNum:3200,
      bucket:['technical_trail','mud_soft_ground'],
      terrenoKeys:['roca','mixto'],tags:['roca','agarre extremo','técnico'],terreno:'Roca / Técnico',
      nivelKeys:['intermedio','avanzado'],objetivoKeys:['competencia','tecnica','velocidad','10K','21K'],
      rol:'agarre',shortReason:'Suela de grafeno para agarre extremo en roca seca.',
      subhead:'La más técnica para roca y terreno duro.',
      copy:'Suela de grafeno para agarre extremo en roca seca. Para corredores técnicos que priorizan precisión sobre terreno duro.',
      highlight:'Ideal si tus rutas tienen mucha roca y necesitas precisión.',
      metricas:{amortiguacion:2,agarre:5,estabilidad:3},distancia:'Corta-Media',
      link:'https://www.amazon.com.mx/s?k=Inov-8+Trailfly+G+270'
    },
    {
      nombre:'Hoka Speedgoat 5',marca:'Hoka',precio:'$3,800 MXN',precioNum:3800,
      bucket:['technical_trail','mixed_trail','mud_soft_ground'],
      terrenoKeys:['montaña','mixto','bosque','roca'],tags:['ultra','distancia','montaña'],terreno:'Ultra / Distancia larga',
      nivelKeys:['intermedio','avanzado'],objetivoKeys:['distancia','21K','51Kplus'],
      rol:'confort',shortReason:'Máxima amortiguación, referencia para ultras.',
      subhead:'Máxima amortiguación para distancias largas.',
      copy:'La referencia en amortiguación para ultras. Protege el pie en kilómetros largos sin sacrificar demasiado en tracción.',
      highlight:'Ideal si estás entrenando para tu primer 50K o ya corres distancias largas.',
      metricas:{amortiguacion:5,agarre:4,estabilidad:4},distancia:'Larga-Ultra',
      link:'https://www.amazon.com.mx/s?k=Hoka+Speedgoat+5+trail'
    },
    {
      nombre:'HOKA Tecton X 2',marca:'Hoka',precio:'$4,800 MXN',precioNum:4800,
      bucket:['technical_trail'],
      terrenoKeys:['roca','montaña'],tags:['roca','montaña','competencia'],terreno:'Roca / Ultra técnico',
      nivelKeys:['avanzado'],objetivoKeys:['competencia','51Kplus'],
      rol:'competencia',shortReason:'Placa de carbono para competencia en ultra técnico.',
      subhead:'Placa de carbono para competir en ultra.',
      copy:'Placa de carbono más amortiguación máxima. Para competir, no para entrenar.',
      highlight:'Ideal si ya tienes ultras y quieres mejorar tu tiempo en carrera.',
      metricas:{amortiguacion:5,agarre:4,estabilidad:4},distancia:'Ultra',
      link:'https://www.amazon.com.mx/s?k=Hoka+Tecton+X+2'
    },
    {
      nombre:'Salomon S/LAB Ultra 3',marca:'Salomon',precio:'$5,200 MXN',precioNum:5200,
      bucket:['technical_trail','mixed_trail'],
      terrenoKeys:['montaña','mixto','roca'],tags:['ultra','montaña','elite'],terreno:'Ultra / Montaña',
      nivelKeys:['avanzado'],objetivoKeys:['competencia','51Kplus','21K'],
      rol:'competencia',shortReason:'El más ligero y reactivo para competencia de ultra.',
      subhead:'Edición de laboratorio para competir.',
      copy:'El más ligero y reactivo del grupo. Para competidores que priorizan rendimiento sobre comodidad.',
      highlight:'Ideal para corredores avanzados que priorizan ligereza sobre protección.',
      metricas:{amortiguacion:4,agarre:4,estabilidad:3},distancia:'Ultra',
      link:'https://www.amazon.com.mx/s?k=Salomon+S+LAB+Ultra+3'
    }
  ];

  // REGLA 6: Pickers explícitos por rol
  function pickRecommended(pool){
    // Más equilibrado: mejor suma de tracción + estabilidad dentro del presupuesto
    const inBudget=pool.filter(z=>z.precioNum<=maxMXN);
    const base=inBudget.length>=1?inBudget:pool;
    return [...base].sort((a,b)=>
      (b.metricas.agarre+b.metricas.estabilidad)-(a.metricas.agarre+a.metricas.estabilidad)
    )[0];
  }

  function pickComfort(pool, excludeNames){
    return [...pool]
      .filter(z=>!excludeNames.includes(z.nombre)&&budgetBadge(z)!=='fuera')
      .sort((a,b)=>b.metricas.amortiguacion-a.metricas.amortiguacion)[0];
  }

  function pickTraction(pool, excludeNames){
    return [...pool]
      .filter(z=>!excludeNames.includes(z.nombre)&&budgetBadge(z)!=='fuera')
      .sort((a,b)=>b.metricas.agarre-a.metricas.agarre)[0];
  }

  // Pool por bucket; fallback a mixed_trail si faltan candidatos
  let pool=catalogo.filter(z=>z.bucket.includes(bucket));
  if(pool.length<3){
    const extras=catalogo.filter(z=>z.bucket.includes('mixed_trail')&&!pool.some(p=>p.nombre===z.nombre));
    pool=[...pool,...extras];
  }

  const rec=pickRecommended(pool);
  const comfort=pickComfort(pool,[rec?.nombre].filter(Boolean));
  const traction=pickTraction(pool,[rec?.nombre,comfort?.nombre].filter(Boolean));

  const roleLabels={
    recomendado:'Mejor para ti',
    alternativa_comoda:'Más comodidad',
    alternativa_traccion:'Más tracción'
  };

  function withRole(z,role){
    if(!z) return null;
    const badge=budgetBadge(z);
    return{...z,
      badgeLabel:roleLabels[role]||'Alternativa',
      budgetBadge:badge,
      rol:role
    };
  }

  const picks=[withRole(rec,'recomendado'),withRole(comfort,'alternativa_comoda'),withRole(traction,'alternativa_traccion')]
    .filter(Boolean);

  // REGLA 10: Gear por bucket
  const gearByBucket={
    mixed_trail:['Medias técnicas de trail (anti-ampolla)','Hidratación: botella suave 500ml mínimo'],
    technical_trail:['Medias anti-ampolla con mejor ajuste','Hidratación: botella suave 500ml o más','Chaleco si la ruta supera 1.5h'],
    mud_soft_ground:['Medias técnicas de secado rápido','Gaiters / polainas opcionales','Cambio de calcetas post-carrera'],
    door_to_trail:['Medias ligeras transpirables','Botella suave 500ml']
  };
  let equipo=[...(gearByBucket[bucket]||gearByBucket.mixed_trail)];

  if(['21K','51Kplus'].includes(objetivo)){equipo.push('Chaleco de hidratación (2L+)','Geles energéticos / nutrición de carrera');}
  if(objetivo==='51Kplus'){equipo.push('Bastones de trail (carbono o aluminio)','Kit de emergencia (manta, silbato, linterna)');}

  const presupuestoLabel={'menos2000':'Menos de $2,000','2000-4000':'$2,000–$4,000','mas4000':'Más de $4,000'};
  const result={
    zapatos:picks.map(z=>({
      nombre:z.nombre,marca:z.marca,precio:z.precio,
      copy:z.copy,descripcion:z.copy,
      terreno:z.terreno,tags:z.tags,link:z.link,
      rol:z.rol,subhead:z.subhead,highlight:z.highlight,
      mejorPara:z.shortReason,distancia:z.distancia,metricas:z.metricas,
      badgeLabel:z.badgeLabel,budgetBadge:z.budgetBadge
    })),
    equipo,objetivo,terreno,presupuesto:presupuestoLabel[presupuesto]||presupuesto,
    bucket
  };
  localStorage.setItem('trailResult',JSON.stringify(result));
  window.location.href='resultados.html';
}
</script>
</body>
</html>
