<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tu equipo ideal — Shoe & Gear Coach</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a1a;padding:20px}
.container{max-width:600px;margin:0 auto}
h1{font-size:1.4rem;margin-bottom:4px}
.subtitle{color:#666;font-size:0.85rem;margin-bottom:8px}
.context-note{background:#e8f4e8;border-radius:8px;padding:10px 14px;font-size:0.85rem;color:#2d6a4f;margin-bottom:24px}
.section-title{font-size:0.85rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:#888;margin:24px 0 12px}
.table{width:100%;border-collapse:collapse;margin-bottom:16px}
.table th,.table td{border:1px solid #e0e0e0;padding:10px;font-size:0.85rem;vertical-align:top}
.table th{background:#f0f0f0;color:#2d6a4f;font-weight:600}
.table tr:nth-child(even){background:#fafafa}
.badge{display:inline-block;background:#2d6a4f;color:#fff;font-size:0.7rem;font-weight:700;padding:2px 8px;border-radius:20px;margin-left:8px}
.gear-list{background:#fff;border-radius:12px;padding:16px;border:1px solid #e0e0e0}
.gear-list ul{padding-left:18px}
.gear-list li{padding:4px 0;font-size:0.875rem;color:#333}
.actions{display:flex;gap:12px;margin-top:24px}
.btn{flex:1;padding:14px;border:none;border-radius:10px;font-size:0.9rem;cursor:pointer;font-weight:600}
.btn-primary{background:#2d6a4f;color:#fff}
.btn-back{background:#fff;color:#2d6a4f;border:1.5px solid #2d6a4f;text-decoration:none;display:flex;align-items:center;justify-content:center}
.no-data{text-align:center;padding:40px 20px;color:#888}
.tag{display:inline-block;background:#e8f4e8;color:#2d6a4f;font-size:0.7rem;font-weight:600;
  padding:2px 8px;border-radius:20px;margin:2px 2px 0 0;text-transform:capitalize}
.buy-link{display:inline-block;margin-top:6px;font-size:0.8rem;color:#2d6a4f;
  font-weight:600;text-decoration:none;border-bottom:1px solid #2d6a4f}
.buy-link:hover{opacity:0.75}
</style>
</head>
<body>
<div class="container"><div id="app"></div></div>
<script>
const data = JSON.parse(localStorage.getItem('trailResult') || 'null');

if (!data) {
    document.getElementById('app').innerHTML = '<div class="no-data"><p>Sin resultados. <a href="index.html">Volver al cuestionario</a></p></div>';
} else {
    const labels = { '5K':'5K', '10K':'10K', '21K':'Media Maratón', '51Kplus':'Ultra 51K+', 'ultra':'Ultra 50K+', 'tecnica':'Técnica', 'distancia':'Distancia', 'velocidad':'Velocidad', 'montaña':'Montaña', 'bosque':'Bosque', 'roca':'Roca', 'mixto':'Mixto', 'entrenamiento':'Entrenamiento', 'competencia':'Competencia' };
    const pLabel = { 'menos2000':'menos de $2,000', '2000-4000':'$2,000–$4,000', 'mas4000':'más de $4,000' };

    function whyCard(z, i, objetivo, terreno) {
        if (i === 0) return `<strong>Primera opción:</strong> mejor relación terreno–presupuesto para tu perfil. Ideal si tu prioridad es tracción en ${labels[terreno]||terreno}.`;
        if (i === 1) return `<strong>Alternativa:</strong> más amortiguación para distancias largas${objetivo==='ultra'?' — crítico en ultras de 50K+':''}.`;
        return `<strong>Tercera opción:</strong> precio más accesible si el presupuesto es la restricción principal.`;
    }

    const zapatosHTML = data.zapatos.map((z, i) => {
        const badge = i===0?'<span class="badge">Recomendado</span>':'';
        const tagsHtml = (z.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('');
        const linkHtml = z.link?`<br><a class="buy-link" href="${z.link}" target="_blank">Comprar</a>`:'';
        return `
            <tr>
                <td>${badge}${z.nombre}</td>
                <td>${z.marca}</td>
                <td>${z.precio}${linkHtml}</td>
                <td>${tagsHtml||z.terreno}</td>
                <td>${z.descripcion}</td>
            </tr>`;
    }).join('');

    const equipoHTML = data.equipo.length
        ? '<ul>' + data.equipo.map(e => `<li>${e}</li>`).join('') + '</ul>'
        : '<p style="color:#aaa;font-size:.85rem">Sin equipo adicional recomendado para este perfil.</p>';

    document.getElementById('app').innerHTML = `
        <h1>Tu equipo para ${labels[data.objetivo]||data.objetivo}</h1>
        <p class="subtitle">${labels[data.terreno]||data.terreno} · ${pLabel[data.presupuesto]||data.presupuesto}</p>
        <p class="context-note">Basado en tu perfil, priorizamos tracción, durabilidad y precio. Los tres zapatos abajo cubren distintas prioridades — elige el que más se alinea con tu situación.</p>
        <div class="section-title">Comparativa de calzado recomendado</div>
        <table class="table">
            <thead>
                <tr>
                    <th>Zapato</th>
                    <th>Marca</th>
                    <th>Precio</th>
                    <th>Tags (Terreno)</th>
                    <th>Descripción</th>
                </tr>
            </thead>
            <tbody>
                ${zapatosHTML}
            </tbody>
        </table>
        <div class="section-title">Equipo prioritario</div>
        <div class="gear-list">${equipoHTML}</div>
        <div class="actions">
            <button class="btn btn-primary" onclick="guardar()">Guardar mi lista</button>
            <a href="index.html" class="btn btn-back">Volver</a>
        </div>`;
}

function guardar() {
    const data = JSON.parse(localStorage.getItem('trailResult') || 'null');
    if (!data) return;
    const txt = ['MI LISTA — Shoe & Gear Coach','='.repeat(36),
        'Objetivo: '+data.objetivo, 'Terreno: '+data.terreno, 'Presupuesto: '+data.presupuesto,'',
        'CALZADO:', ...data.zapatos.map(z=>'• '+z.nombre+' ('+z.marca+') — '+z.precio),'',
        'EQUIPO:', ...data.equipo.map(e=>'• '+e)].join('\n');
    navigator.clipboard.writeText(txt).then(()=>alert('Lista copiada'));
}
</script>
</body>
</html>
