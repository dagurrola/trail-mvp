<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tu equipo ideal — Shoe & Gear Coach</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
*,*::before,*::after{box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a1a;margin:0;padding:20px;}
.container{max-width:640px;margin:0 auto;}
h1{font-size:1.8rem;margin:0 0 6px;}
.subtitle{color:#666;font-size:.9rem;margin-bottom:24px;}
.section{margin-top:32px;}
.section-title{font-size:1rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:#444;margin-bottom:12px;}
.table{width:100%;border-collapse:collapse;}
.table th,.table td{padding:12px;border:1px solid #e0e0e0;text-align:left;vertical-align:top;}
.table th{background:#e8f4e8;color:#2d6a4f;font-weight:700;}
.tag-recommended{display:inline-block;background:#cde9c4;color:#198754;border-radius:4px;padding:2px 8px;font-size:.75rem;vertical-align:top;margin-left:8px;}
.actions{display:flex;gap:12px;margin-top:24px;}
.btn{flex:1;padding:14px;border:none;border-radius:10px;font-size:.95rem;cursor:pointer;font-weight:600;}
.btn-primary{background:#2d6a4f;color:#fff;}
.btn-secondary{background:#fff;color:#2d6a4f;border:1.5px solid #2d6a4f;}
.no-data{text-align:center;padding:40px 20px;color:#888;}
.microcopy{color:#555;font-size:12px;text-align:center;margin-top:8px;}
@media(min-width:600px){
    .table th,.table td{padding:16px;}
    h1{font-size:2.3rem;}
}
</style>
</head>
<body>
<div class="container"><div id="app"></div></div>
<script>
const data=JSON.parse(localStorage.getItem('trailResult'));
if(!data){document.getElementById('app').innerHTML='<div class="no-data"><p>No hay resultados. <a href="index.html">Volver al cuestionario</a></p></div>';return;}
const {zapatos, equipo, objetivo, terreno, presupuesto}=data;
const objetivos={'5K':'5K','10K':'10K','21K':'Media Maratón','ultra':'Ultra 50K+'};
const app=document.getElementById('app');
app.innerHTML=`<h1>Tu equipo ideal para ${objetivos[objetivo]||objetivo}</h1>
<p class="subtitle">Terreno: ${terreno} · Presupuesto: ${presupuesto}</p>
<div class="section"><div class="section-title">Calzado recomendado</div>
<table class="table"><thead><tr><th>Zapato</th><th>Marca</th><th>Precio</th><th>Descripción</th></tr></thead><tbody>
${zapatos.map((z,i)=>`<tr><td>${z.nombre}${i===0?' <span class="tag-recommended">RECOMENDADO</span>':''}</td><td>${z.marca}</td><td>${z.precio}</td><td>${z.descripcion}</td></tr>`).join('')}
</tbody></table>
</div>
<div class="section"><div class="section-title">Equipo prioritario</div><div class="gear-list"><ul>${equipo.map(e=>`<li>${e}</li>`).join('')}</ul></div></div>
<div class="microcopy">Haz clic en "Guardar mi lista" para copiar la lista completa al portapapeles.</div>
<div class="actions"><button class="btn btn-primary" onclick="copyList()">Guardar mi lista</button><a href="index.html"><button class="btn btn-secondary">Volver</button></a></div>`;
function copyList(){let txt='MI LISTA DE EQUIPO — Shoe & Gear Coach\n=====================================\nObjetivo: '+objetivo+'\nTerreno: '+terreno+'\nPresupuesto: '+presupuesto+'\n\nCALZADO RECOMENDADO:\n'+zapatos.map(z=>'• '+z.nombre+' ('+z.marca+') — '+z.precio).join('\n')+'\n\nEQUIPO PRIORITARIO:\n'+equipo.map(e=>'• '+e).join('\n');navigator.clipboard.writeText(txt).then(()=>alert('Lista copiada al portapapeles!'));}
}
</script>
</body>
</html>
