<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tu equipo ideal — Shoe & Gear Coach</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a1a; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { font-size: 1.5rem; margin-bottom: 6px; color: #1a1a1a; }
        .subtitle { color: #666; font-size: 0.9rem; margin-bottom: 24px; }
        .section-title { font-size: 1rem; font-weight: 600; margin: 20px 0 12px; text-transform: uppercase; letter-spacing: 0.05em; color: #444; }
        .shoe-card { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 12px; border: 1px solid #e0e0e0; }
        .shoe-card .name { font-size: 1.1rem; font-weight: 700; }
        .shoe-card .brand { font-size: 0.8rem; color: #888; margin-bottom: 6px; }
        .shoe-card .price { font-size: 1rem; font-weight: 600; color: #2d6a4f; margin-bottom: 6px; }
        .shoe-card .desc { font-size: 0.875rem; color: #555; }
        .shoe-card .tag { display: inline-block; background: #e8f4e8; color: #2d6a4f; border-radius: 4px; padding: 2px 8px; font-size: 0.75rem; margin-top: 8px; }
        .gear-list { background: #fff; border-radius: 12px; padding: 16px; border: 1px solid #e0e0e0; }
        .gear-list ul { padding-left: 20px; }
        .gear-list li { padding: 4px 0; font-size: 0.9rem; color: #333; }
        .actions { display: flex; gap: 12px; margin-top: 24px; }
        .btn { flex: 1; padding: 14px; border: none; border-radius: 10px; font-size: 0.95rem; cursor: pointer; font-weight: 600; }
        .btn-primary { background: #2d6a4f; color: #fff; }
        .btn-secondary { background: #fff; color: #2d6a4f; border: 1.5px solid #2d6a4f; }
        .no-data { text-align: center; padding: 40px 20px; color: #888; }
    </style>
</head>
<body>
    <div class="container">
        <div id="app"></div>
    </div>
    <script>
        const data = JSON.parse(localStorage.getItem('trailResult') || 'null');

        if (!data) {
            document.getElementById('app').innerHTML = '<div class="no-data"><p>No hay resultados. <a href="index.html">Volver al cuestionario</a></p></div>';
        } else {
            const objetivoLabel = { '5K': '5K', '10K': '10K', '21K': 'Media Maratón', ultra: 'Ultra 50K+' };
            const zapatosHTML = data.zapatos.map(z => `
                <div class="shoe-card">
                    <div class="name">${z.nombre}</div>
                    <div class="brand">${z.marca}</div>
                    <div class="price">${z.precio}</div>
                    <div class="desc">${z.descripcion}</div>
                    <span class="tag">${z.terreno}</span>
                </div>
            `).join('');

            const equipoHTML = data.equipo.length
                ? '<ul>' + data.equipo.map(e => `<li>${e}</li>`).join('') + '</ul>'
                : '<p style="color:#888">Sin equipo adicional recomendado por ahora.</p>';

            document.getElementById('app').innerHTML = `
                <h1>Tu equipo ideal para ${objetivoLabel[data.objetivo] || data.objetivo}</h1>
                <p class="subtitle">Terreno: ${data.terreno} &middot; Presupuesto: ${data.presupuesto}</p>
                <div class="section-title">Calzado recomendado</div>
                ${zapatosHTML}
                <div class="section-title">Equipo prioritario</div>
                <div class="gear-list">${equipoHTML}</div>
                <div class="actions">
                    <button class="btn btn-primary" onclick="guardar()">Guardar mi lista</button>
                    <a href="index.html"><button class="btn btn-secondary">Volver</button></a>
                </div>
            `;
        }

        function guardar() {
            const data = JSON.parse(localStorage.getItem('trailResult') || 'null');
            if (!data) return;
            const texto = [
                'MI LISTA DE EQUIPO — Shoe & Gear Coach',
                '=====================================',
                'Objetivo: ' + data.objetivo,
                'Terreno: ' + data.terreno,
                'Presupuesto: ' + data.presupuesto,
                '',
                'CALZADO RECOMENDADO:',
                ...data.zapatos.map(z => '• ' + z.nombre + ' (' + z.marca + ') — ' + z.precio),
                '',
                'EQUIPO PRIORITARIO:',
                ...data.equipo.map(e => '• ' + e)
            ].join('\n');
            navigator.clipboard.writeText(texto).then(() => alert('Lista copiada al portapapeles!'));
        }
    </script>
</body>
</html>
