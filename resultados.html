<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tu equipo ideal — Shoe Coach</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a1a;padding:20px 16px 40px}
.container{max-width:680px;margin:0 auto}

.eyebrow{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#6b7280;margin-bottom:6px}
h1{font-size:1.25rem;font-weight:700;margin-bottom:8px}
.subtitle{color:#555;font-size:.85rem;line-height:1.55;margin-bottom:24px}

/* Cards */
.shoe-grid{display:grid;gap:14px;margin-bottom:28px}

.shoe-card{background:#fff;border:1.5px solid #e7e7e7;border-radius:16px;padding:18px;display:flex;flex-direction:column;gap:10px}
.shoe-card.featured{border-color:#14532d;box-shadow:0 8px 28px rgba(20,83,45,.10)}

.shoe-badge{display:inline-flex;width:fit-content;padding:4px 11px;border-radius:999px;background:#dcfce7;color:#14532d;font-size:.7rem;font-weight:700}
.shoe-badge.alt{background:#f3f4f6;color:#374151}

.shoe-card h3{font-size:.975rem;font-weight:700;line-height:1.3}
.shoe-subhead{font-size:.825rem;font-weight:600;color:#374151}
.shoe-copy{font-size:.825rem;color:#555;line-height:1.55}
.shoe-highlight{font-size:.8rem;font-weight:600;color:#14532d;padding:8px 10px;background:#f0fdf4;border-radius:8px}

.shoe-tags{display:flex;flex-wrap:wrap;gap:6px}
.shoe-tags span{padding:3px 9px;border-radius:999px;background:#f3f4f6;font-size:.7rem;font-weight:500}

.shoe-metrics{display:grid;gap:6px;padding-top:12px;border-top:1px solid #f0f0f0}
.metric-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.metric-label{font-size:.72rem;color:#6b7280;min-width:88px}
.metric-dots{font-size:.85rem;letter-spacing:1px;color:#14532d}

.shoe-price-row{display:flex;align-items:center;gap:10px;padding-top:8px}.shoe-price-row .shoe-price{flex-shrink:0}
.shoe-price{font-size:1rem;font-weight:700}
.buy-btn{display:inline-block;padding:10px 16px;background:#14532d;color:#fff;border-radius:8px;font-size:.8rem;font-weight:600;text-decoration:none;flex-grow:1;text-align:center;min-height:40px;line-height:1.2}
.buy-btn:hover{background:#166534}
.budget-badge{display:inline-block;font-size:.68rem;font-weight:600;padding:3px 8px;border-radius:6px;margin-top:4px}
.budget-dentro{background:#f0fdf4;color:#14532d}
.budget-subir{background:#fef9c3;color:#854d0e}
.budget-fuera{background:#fef2f2;color:#991b1b}

/* Compare */
.section-title{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#9ca3af;margin-bottom:10px}
.compare-wrap{overflow-x:auto;margin-bottom:24px}
.compare-table{width:100%;min-width:540px;border-collapse:collapse}
.compare-table th,.compare-table td{padding:9px 11px;text-align:left;border-bottom:1px solid #ececec;font-size:.78rem;vertical-align:middle;white-space:nowrap;min-width:80px}
.compare-table th{font-size:.68rem;text-transform:uppercase;letter-spacing:.04em;color:#9ca3af;font-weight:600}
.compare-table tbody tr:hover td{background:#fafafa}
.compare-table td:first-child{font-weight:600}

/* Gear */
.gear-box{background:#fff;border-radius:12px;padding:16px;border:1px solid #e0e0e0;margin-bottom:28px}
.gear-box ul{padding-left:18px}
.gear-box li{padding:3px 0;font-size:.85rem;color:#374151}

.actions{display:flex;gap:14px}
.btn-back{flex:1;padding:13px;background:#f3f4f6;color:#374151;border:none;border-radius:10px;font-size:.875rem;font-weight:600;text-decoration:none;display:flex;align-items:center;justify-content:center}

.no-data{text-align:center;padding:40px 20px;color:#888}
.btn-whatsapp{flex:1;padding:13px;background:#25D366;color:#fff;border:none;border-radius:10px;font-size:.875rem;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-whatsapp:hover{background:#1ebe5d}

/* ===== Prototipo C — Ver más ===== */
#ver-mas-wrapper{margin:28px 0 0;padding-top:24px;border-top:2px solid #e7e7e7;text-align:center}
#ver-mas-wrapper p{font-size:.78rem;color:#6b7280;margin-bottom:12px}
.btn-ver-mas{display:block;width:100%;padding:14px;background:#14532d;color:#fff;border:none;border-radius:10px;font-size:.9rem;font-weight:700;cursor:pointer;transition:background .18s;letter-spacing:.01em}
.btn-ver-mas:hover{background:#166534}
.btn-ver-mas:disabled{opacity:.45;cursor:default;background:#6b7280}

#exploracion{display:none;margin-top:4px}
#exploracion h2{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#9ca3af;margin-bottom:12px}

.filtros-exp{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:18px;padding:14px;background:#fff;border:1px solid #e7e7e7;border-radius:12px}
.filtro-grupo{display:flex;flex-direction:column;gap:4px;min-width:140px;flex:1}
.filtro-grupo label{font-size:.7rem;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.04em}
.filtro-grupo select{padding:6px 8px;border:1px solid #d1d5db;border-radius:7px;font-size:.82rem;background:#fff}
.filtro-grupo input[type=range]{margin-top:4px;accent-color:#14532d}
.presupuesto-val{font-size:.78rem;color:#374151;font-weight:600}

#cards-exploracion{display:grid;gap:14px}
#msg-vacio-exp{text-align:center;font-style:italic;color:#888;padding:20px 0;display:none}

@media(max-width:600px){.filtros-exp{flex-direction:column}}
</style>
</head>
<body>
<div class="container"><div id="app"></div></div>
<script>
const data = JSON.parse(localStorage.getItem('trailResult') || 'null');

if (!data) {
    document.getElementById('app').innerHTML = '<div class="no-data"><p>Sin resultados. <a href="index.html">Volver al cuestionario</a></p></div>';
} else {
    const terrenoLabel = {
        montaña:'Montaña', bosque:'Bosque', roca:'Roca', mixto:'Mixto'
    };
    const objLabel = {
        tecnica:'Técnica', distancia:'Distancia', velocidad:'Velocidad',
        '5K':'5K', '10K':'10K', '21K':'21K', '51Kplus':'Ultra 51K+',
        entrenamiento:'Entrenamiento', competencia:'Competencia'
    };
    const badgeLabels = {
        versátil:'Más equilibrado', confort:'Más comodidad', agarre:'Más tracción',
        ligero:'Más ligero', velocidad:'Más velocidad', competencia:'Para competir'
    };

    function dots(n, max=5){
        n = Math.min(Math.max(Math.round(n), 0), max);
        return '<span style="color:#14532d">' + '●'.repeat(n) + '</span>' +
               '<span style="color:#d1d5db">' + '○'.repeat(max - n) + '</span>';
    }

    function renderCard(z, i) {
        const featured = i === 0;
        const badge = featured
            ? '<span class="shoe-badge">Mejor para ti</span>'
            : `<span class="shoe-badge alt">${badgeLabels[z.rol] || 'Alternativa'}</span>`;

        const tagList = (z.tags && z.tags.length)
            ? z.tags.map(t => `<span>${t}</span>`).join('')
            : `<span>${z.terreno || 'Trail'}</span>`;
        const budgetBadgeMap = {
            dentro: ['budget-dentro', 'Dentro de tu presupuesto'],
            subir:  ['budget-subir',  'Si puedes subir un poco'],
            fuera:  ['budget-fuera',  'Fuera de presupuesto']
        };
        const [budgetClass, budgetText] = budgetBadgeMap[z.budgetBadge] || ['budget-dentro', ''];
        const budgetBadgeHtml = budgetText ? `<span class="budget-badge ${budgetClass}">${budgetText}</span>` : '';

        const metrics = z.metricas ? `
            <div class="shoe-metrics">
                <div class="metric-row"><span class="metric-label">Amortiguación</span><span class="metric-dots">${dots(z.metricas.amortiguacion)}</span></div>
                <div class="metric-row"><span class="metric-label">Agarre</span><span class="metric-dots">${dots(z.metricas.agarre)}</span></div>
                <div class="metric-row"><span class="metric-label">Estabilidad</span><span class="metric-dots">${dots(z.metricas.estabilidad)}</span></div>
            </div>` : '';

        function getBuyLink(z) {
              if (z.linkRunnics) return { url: z.linkRunnics, label: 'Comprar en Runnics' };
              if (z.linkDecathlon) return { url: z.linkDecathlon, label: 'Comprar en Decathlon' };
              if (z.link) return { url: z.link, label: 'Ver en Amazon MX' };
              return null;
            }
            const _buy = getBuyLink(z);
            const link = _buy ? `<a class="buy-btn" href="${_buy.url}" target="_blank">${_buy.label}</a>` : '';

        return `
        <article class="shoe-card${featured ? ' featured' : ''}">
            ${badge}
            <h3>${z.nombre}</h3>
            <p class="shoe-subhead">${z.subhead || z.mejorPara || z.terreno || 'Trail'}</p>
            <div class="shoe-tags">${tagList}</div>
            <p class="shoe-copy">${z.copy || z.descripcion}</p>
            ${z.highlight ? `<p class="shoe-highlight">${z.highlight}</p>` : ''}
            ${metrics}
            <div class="shoe-price-row">
                <span class="shoe-price">${z.precio}</span>
                ${link}
            </div>
            ${budgetBadgeHtml}
        </article>`;
    }

    function renderCompareRow(z) {
        const m = z.metricas;
        const fmt = v => (typeof v === 'number') ? v + '/5' : (v || '–');
        return `<tr>
            <td>${z.nombre}</td>
            <td>${z.mejorPara || z.terreno || '–'}</td>
            <td>${m ? fmt(m.amortiguacion) : '–'}</td>
            <td>${m ? fmt(m.agarre) : '–'}</td>
            <td>${m ? fmt(m.estabilidad) : '–'}</td>
            <td>${z.distancia || '–'}</td>
        </tr>`;
    }

    const terr = terrenoLabel[data.terreno] || data.terreno || 'trail';
    const obj  = objLabel[data.objetivo] || data.objetivo || '';

    document.getElementById('app').innerHTML = `
        <p class="eyebrow">${terr}${obj ? ' · ' + obj : ''} · ${data.presupuesto}</p>
        <h1>Tus opciones para ${terr.toLowerCase()}</h1>
        <p class="subtitle">Según tu perfil, priorizamos tracción, durabilidad y valor por precio. Una opción equilibrada, una más cómoda y una con mayor agarre — para que elijas según lo que más importa en tu próxima salida.</p>

        <p class="section-title">Comparativa rápida</p>
        <div class="compare-wrap">
            <table class="compare-table">
                <thead><tr>
                    <th>Modelo</th><th>Mejor para</th>
                    <th>Amortiguación</th><th>Agarre</th><th>Estabilidad</th><th>Distancia</th>
                </tr></thead>
                <tbody>${data.zapatos.map(renderCompareRow).join('')}</tbody>
            </table>
        </div>

        <p class="section-title">Detalle de cada opción</p>
        <div class="shoe-grid">
            ${data.zapatos.map((z, i) => renderCard(z, i)).join('')}
        </div>

        <p class="section-title">Equipo prioritario</p>
        <div class="gear-box">
            <ul>${(data.equipo||[]).map(e => `<li>${e}</li>`).join('')}</ul>
        </div>

        <div class="actions">
            <a href="index.html" class="btn-back">← Volver al cuestionario</a>
            <button id="btn-wa" class="btn-whatsapp">📲 Enviar por WhatsApp</button>
        </div>

        <div id="ver-mas-wrapper">
            <p>¿No convence ninguna? Hay más opciones para tu perfil.</p>
            <button id="btn-ver-mas" class="btn-ver-mas">Ver más opciones →</button>
        </div>

        <section id="exploracion">
            <h2>Más opciones para tu perfil</h2>
            <div class="filtros-exp" id="filtros-exp">
                <div class="filtro-grupo">
                    <label for="filtro-terreno">Terreno</label>
                    <select id="filtro-terreno">
                        <option value="">Cualquiera</option>
                        <option value="montaña">Montaña</option>
                        <option value="mixto">Mixto / Bosque</option>
                        <option value="barro">Barro / Tierra suelta</option>
                        <option value="bosque">Bosque</option>
                        <option value="roca">Roca / Técnico</option>
                    </select>
                </div>
                <div class="filtro-grupo">
                    <label for="filtro-nivel">Nivel</label>
                    <select id="filtro-nivel">
                        <option value="">Cualquiera</option>
                        <option value="principiante">Principiante</option>
                        <option value="intermedio">Intermedio</option>
                        <option value="avanzado">Avanzado</option>
                    </select>
                </div>
                <div class="filtro-grupo">
                    <label for="filtro-presupuesto">Presupuesto máximo: <span class="presupuesto-val" id="presupuesto-val">$5,200 MXN</span></label>
                    <input type="range" id="filtro-presupuesto" min="1600" max="5200" step="200">
                </div>
            </div>
            <div id="cards-exploracion"></div>
            <p id="msg-vacio-exp">No hay opciones con estos filtros. Intenta ampliar el presupuesto o cambiar el terreno.</p>
        </section>`;

    function buildWhatsAppMsg() {
        const rolLabels = {
            'vers\u00e1til':'M\u00e1s equilibrado', 'confort':'M\u00e1s comodidad', 'agarre':'M\u00e1s tracci\u00f3n',
            'estabilidad':'M\u00e1s estabilidad', 'ligero':'M\u00e1s ligero',
            'velocidad':'M\u00e1s velocidad', 'competencia':'Para competir'
        };
        var lines = ['\u{1F3C3} Tus 3 opciones de tenis trail', ''];
        data.zapatos.forEach(function(z, i) {
            var rol = i === 0 ? 'Mejor para ti' : (rolLabels[z.rol] || 'Alternativa');
            lines.push('*' + (i+1) + '. ' + z.nombre + ' \u2014 ' + rol + '*');
            if (z.subhead) lines.push(z.subhead);
            lines.push(z.precio);
            if (z.link) lines.push('\u{1F517} ' + z.link);
            lines.push('');
        });
        lines.push('---');
        lines.push('Generado con Trail Shoe Coach \u{1F33F}');
        return lines.join('\n');
    }

    document.getElementById('btn-wa').addEventListener('click', function() {
        var msg = buildWhatsAppMsg();
        window.open('https://wa.me/?text=' + encodeURIComponent(msg), '_blank');
        // Registrar clic en WhatsApp
        try {
            fetch('https://formspree.io/f/xrejzqow', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                body: JSON.stringify({
                    evento: 'whatsapp_click',
                    terreno: data.terreno || '',
                    presupuesto: data.presupuesto || '',
                    nivel: data.nivel || '',
                    zapato_1: (data.zapatos[0]||{}).nombre || '',
                    _subject: 'Trail — WhatsApp click (' + (data.terreno||'') + ' / ' + (data.presupuesto||'') + ')'
                })
            }).catch(function(){});
        } catch(e) {}
    });

    // ========== Prototipo C — Exploración ==========
    (function() {
        var btnVerMas = document.getElementById('btn-ver-mas');
        var seccion = document.getElementById('exploracion');
        var filtroTerreno = document.getElementById('filtro-terreno');
        var filtroNivel = document.getElementById('filtro-nivel');
        var filtroPresupuesto = document.getElementById('filtro-presupuesto');
        var presupuestoVal = document.getElementById('presupuesto-val');
        var cardsExp = document.getElementById('cards-exploracion');
        var msgVacio = document.getElementById('msg-vacio-exp');

        var catalogoRaw = localStorage.getItem('trailCatalogo');
        if (!catalogoRaw || !btnVerMas) return;
        var CATALOGO = JSON.parse(catalogoRaw);

        // Pre-cargar filtros con valores del wizard
        var wTerreno = localStorage.getItem('wizard_terreno') || '';
        var wNivel = localStorage.getItem('wizard_nivel') || '';
        var wMaxNum = parseInt(localStorage.getItem('wizard_presupuesto_num') || '4000', 10);
        var wBucket = localStorage.getItem('wizard_bucket') || '';

        filtroTerreno.value = wTerreno;
        filtroNivel.value = wNivel;
        var initMax = Math.min(wMaxNum > 1600 ? wMaxNum : 5200, 5200);
        filtroPresupuesto.value = initMax;
        presupuestoVal.textContent = '$' + initMax.toLocaleString('es-MX') + ' MXN';

        // Nombres de las 3 picks ya mostradas (para marcarlas)
        var picksNames = (data && data.zapatos) ? data.zapatos.map(function(z) { return z.nombre; }) : [];

        function scoreZapato(z) {
            var s = 0;
            // Coincidencia de bucket → máxima relevancia
            if (wBucket && z.bucket && z.bucket.includes(wBucket)) s += 10;
            // Nivel match
            if (wNivel && z.nivelKeys && z.nivelKeys.includes(wNivel)) s += 4;
            // Calidad intrínseca (agarre + estabilidad)
            if (z.metricas) s += (z.metricas.agarre || 0) + (z.metricas.estabilidad || 0);
            return s;
        }

        function fmt(n) { return '$' + n.toLocaleString('es-MX') + ' MXN'; }

        function filtrarYRenderizar() {
            var terr = filtroTerreno.value;
            var niv = filtroNivel.value;
            var maxP = parseInt(filtroPresupuesto.value, 10);

            var lista = CATALOGO.filter(function(z) {
                if (terr && (!z.terrenoKeys || !z.terrenoKeys.includes(terr))) return false;
                if (niv && (!z.nivelKeys || !z.nivelKeys.includes(niv))) return false;
                if (z.precioNum > maxP) return false;
                return true;
            });

            lista.sort(function(a, b) { return scoreZapato(b) - scoreZapato(a); });

            cardsExp.innerHTML = '';
            if (lista.length === 0) {
                msgVacio.style.display = 'block';
                return;
            }
            msgVacio.style.display = 'none';

            lista.forEach(function(z) {
                var isTop = picksNames.includes(z.nombre);
                var topBadge = isTop ? '<span class="shoe-badge alt" style="font-size:.65rem">Ya en tus 3 opciones</span>' : '';
                var m = z.metricas || {};
                function dots(n) {
                    n = Math.min(Math.max(Math.round(n||0), 0), 5);
                    return '<span style="color:#14532d">' + '●'.repeat(n) + '</span>' +
                           '<span style="color:#d1d5db">' + '○'.repeat(5-n) + '</span>';
                }
                var card = document.createElement('article');
                card.className = 'shoe-card' + (isTop ? '' : '');
                card.innerHTML = topBadge +
                    '<h3>' + z.nombre + '</h3>' +
                    '<p class="shoe-subhead">' + (z.subhead || z.terreno || '') + '</p>' +
                    '<div class="shoe-tags">' + (z.tags||[]).map(function(t){return '<span>'+t+'</span>';}).join('') + '</div>' +
                    '<p class="shoe-copy">' + (z.copy || '') + '</p>' +
                    (m ? '<div class="shoe-metrics">' +
                        '<div class="metric-row"><span class="metric-label">Amortiguación</span><span class="metric-dots">' + dots(m.amortiguacion) + '</span></div>' +
                        '<div class="metric-row"><span class="metric-label">Agarre</span><span class="metric-dots">' + dots(m.agarre) + '</span></div>' +
                        '<div class="metric-row"><span class="metric-label">Estabilidad</span><span class="metric-dots">' + dots(m.estabilidad) + '</span></div>' +
                    '</div>' : '') +
                    '<div class="shoe-price-row"><span class="shoe-price">' + fmt(z.precioNum) + '</span>' +
                    (z.link ? '<a class="buy-btn" href="' + z.link + '" target="_blank" rel="noopener" data-zapato="' + z.nombre + '">Comprar</a>' : '') +
                    '</div>';

                // Track click en tienda desde exploración
                var buyBtn = card.querySelector('.buy-btn');
                if (buyBtn) {
                    buyBtn.addEventListener('click', function() {
                        try {
                            fetch('https://formspree.io/f/xrejzqow', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                                body: JSON.stringify({
                                    evento: 'exploracion_compra_click',
                                    version: 'C',
                                    zapato: z.nombre,
                                    filtro_terreno: filtroTerreno.value,
                                    filtro_nivel: filtroNivel.value,
                                    filtro_presupuesto: filtroPresupuesto.value,
                                    _subject: 'Trail — Exploración click (' + z.nombre + ')'
                                })
                            }).catch(function(){});
                        } catch(e) {}
                    });
                }

                cardsExp.appendChild(card);
            });
        }

        btnVerMas.addEventListener('click', function() {
            seccion.style.display = 'block';
            btnVerMas.disabled = true;
            btnVerMas.textContent = 'Más opciones ↓';
            filtrarYRenderizar();
            // Track apertura de exploración
            try {
                fetch('https://formspree.io/f/xrejzqow', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify({ evento: 'ver_mas_click', version: 'C', terreno: wTerreno, nivel: wNivel, _subject: 'Trail — Ver más click' })
                }).catch(function(){});
            } catch(e) {}
        });

        filtroTerreno.addEventListener('change', function() { if (seccion.style.display !== 'none') filtrarYRenderizar(); });
        filtroNivel.addEventListener('change', function() { if (seccion.style.display !== 'none') filtrarYRenderizar(); });
        filtroPresupuesto.addEventListener('input', function(e) {
            presupuestoVal.textContent = '$' + parseInt(e.target.value).toLocaleString('es-MX') + ' MXN';
            if (seccion.style.display !== 'none') filtrarYRenderizar();
        });
    })();

    // Formspree — registrar sesión silenciosamente
    (function() {
        try {
            var z = data.zapatos || [];
            var rolLabel = { recomendado:'Mejor para ti', alternativa_comoda:'Más comodidad', alternativa_traccion:'Más tracción' };
            var payload = {
                terreno: data.terreno || '',
                presupuesto: data.presupuesto || '',
                objetivo: data.objetivo || '',
                bucket: data.bucket || '',
                nivel: data.nivel || '',
                dispositivo: /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent) ? 'móvil' : 'desktop',
                modelo: (function(){
                    var ua = navigator.userAgent;
                    var m = ua.match(/iPhone|iPad/);
                    if(m) return m[0];
                    m = ua.match(/Android.*?;\s*([^)]+)\)/);
                    if(m) return m[1].trim();
                    return 'desconocido';
                })(),
                pantalla: screen.width + 'x' + screen.height,
                idioma: navigator.language || '',
