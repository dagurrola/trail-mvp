<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trail Shoe Coach — Explorador</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;min-height:100vh;padding:20px;color:#1a1a1a}
        .container{max-width:1400px;margin:0 auto}

        header{background:#14532d;color:#fff;border-radius:14px;padding:24px 28px;margin-bottom:28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
        header h1{font-size:1.25rem;font-weight:700}
        header p{font-size:.82rem;opacity:.85;margin-top:4px}
        .header-link{font-size:.78rem;color:#86efac;text-decoration:none;white-space:nowrap}
        .header-link:hover{color:#fff}

        .main-grid{display:grid;grid-template-columns:300px 1fr;gap:24px;margin-bottom:40px}

        /* FILTERS */
        .filters-panel{background:#fff;border-radius:12px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,.08);height:fit-content;position:sticky;top:20px;border-top:4px solid #14532d}
        .filters-panel h2{font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#6b7280;margin-bottom:16px}
        .filter-group{margin-bottom:18px}
        .filter-group:last-of-type{margin-bottom:0}
        .filter-label{font-weight:600;color:#374151;margin-bottom:7px;font-size:.82rem;display:flex;align-items:center;gap:5px}
        select{width:100%;padding:8px 10px;border:1.5px solid #d1d5db;border-radius:7px;font-size:.85rem;background:#fff;color:#1a1a1a}
        select:focus{outline:none;border-color:#14532d}
        .checkbox-group{display:flex;flex-direction:column;gap:7px}
        .checkbox-item{display:flex;align-items:center;gap:8px;cursor:pointer}
        input[type="checkbox"]{width:16px;height:16px;accent-color:#14532d;cursor:pointer;flex-shrink:0}
        .checkbox-item label{cursor:pointer;font-size:.85rem;color:#374151;flex:1}
        .reset-btn{width:100%;margin-top:18px;padding:10px;background:#f0fdf4;border:1.5px solid #14532d;border-radius:8px;cursor:pointer;font-weight:600;color:#14532d;font-size:.83rem;transition:all .2s}
        .reset-btn:hover{background:#14532d;color:#fff}

        /* STATS */
        .stats{background:#fff;border-radius:10px;padding:14px 18px;margin-bottom:18px;display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
        .stat-item{text-align:center}
        .stat-number{font-size:1.5rem;font-weight:700;color:#14532d}
        .stat-label{font-size:.7rem;color:#9ca3af;text-transform:uppercase;letter-spacing:.04em;margin-top:2px}

        /* CARDS */
        .results-container{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
        .shoe-card{background:#fff;border-radius:12px;padding:18px;box-shadow:0 2px 10px rgba(0,0,0,.07);border-left:4px solid #d1d5db;transition:box-shadow .2s,transform .2s}
        .shoe-card:hover{box-shadow:0 6px 20px rgba(0,0,0,.12);transform:translateY(-3px)}
        .shoe-card.top{border-left-color:#14532d;background:linear-gradient(to bottom,#f0fdf4,#fff)}
        .shoe-badge-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
        .badge{display:inline-block;padding:3px 9px;border-radius:999px;font-size:.68rem;font-weight:700}
        .badge.top-pick{background:#dcfce7;color:#14532d}
        .badge.rol{background:#f3f4f6;color:#374151}
        .shoe-name{font-size:.95rem;font-weight:700;color:#1a1a1a;margin-bottom:3px}
        .shoe-subhead{font-size:.78rem;color:#6b7280;margin-bottom:10px}
        .shoe-price-tag{display:inline-block;background:#14532d;color:#fff;padding:3px 10px;border-radius:5px;font-size:.8rem;font-weight:700;margin-bottom:10px}
        .metrics{display:grid;gap:5px;padding:10px 0;border-top:1px solid #f0f0f0;border-bottom:1px solid #f0f0f0;margin-bottom:10px}
        .metric-row{display:flex;align-items:center;justify-content:space-between}
        .metric-lbl{font-size:.7rem;color:#9ca3af;min-width:90px}
        .metric-dots{font-size:.8rem;letter-spacing:1px}
        .shoe-copy{font-size:.78rem;color:#555;line-height:1.5;margin-bottom:10px}
        .tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
        .tag{padding:2px 8px;border-radius:999px;background:#f3f4f6;font-size:.68rem;color:#374151}
        .buy-btn{display:block;width:100%;padding:9px;background:#14532d;color:#fff;border:none;border-radius:8px;font-size:.82rem;font-weight:600;text-align:center;text-decoration:none;cursor:pointer;transition:background .18s}
        .buy-btn:hover{background:#166534}
        .no-results{text-align:center;padding:40px 20px;background:#fff;border-radius:12px;color:#888;grid-column:1/-1}

        /* RESPONSIVE */
        @media(max-width:768px){
            .main-grid{grid-template-columns:1fr}
            .filters-panel{position:relative;top:0}
            header{flex-direction:column;align-items:flex-start}
        }
    </style>
</head>

                    </div>
                </div>
            </div>

            <button class="reset-btn" onclick="resetFilters()">↺ Reiniciar filtros</button>
        </div>

        <div>
            <div class="stats" id="stats"></div>
            <div class="results-container" id="results"></div>
        </div>
    </div>
</div>

function dots(n){
  n=Math.min(Math.max(Math.round(n||0),0),5);
  return '<span style="color:#14532d">'+'\u25cf'.repeat(n)+'</span>'+
         '<span style="color:#d1d5db">'+'\u25cb'.repeat(5-n)+'</span>';
}

function renderShoes(filtered){

    <div class="stat-item" style="grid-column:1/-1;text-align:left;font-size:.72rem;color:#9ca3af;padding:4px 0;border-bottom:1px solid #f0f0f0;margin-bottom:4px">⚠️ Precios de referencia — pueden variar en tienda. Haz clic en cada zapato para verificar el precio real en Amazon.</div>
    <div class="stat-item"><div class="stat-number">${filtered.length}</div><div class="stat-label">Resultados</div></div>
    <div class="stat-item"><div class="stat-number">$${avgP.toLocaleString('es-MX')}</div><div class="stat-label">Precio ref. promedio</div></div>
    <div class="stat-item"><div class="stat-number">${filtered.filter(z=>z.precioNum<2000).length}</div><div class="stat-label">Menos de $2K</div></div>
  `;
  const rolLabel={versátil:'Versátil',confort:'Confort',agarre:'Agarre',ligero:'Ligero',técnico:'Técnico',
    equilibrado:'Equilibrado',estabilidad:'Estabilidad',velocidad:'Velocidad',
    competencia:'Competencia',ultra:'Ultra',transición:'Transición',protección:'Protección'};
  results.innerHTML=filtered.map(z=>{
    const isTop=(z.metricas.agarre+z.metricas.estabilidad)>=8;
    return `<div class="shoe-card${isTop?' top':''}">
      <div class="shoe-badge-row">
        ${isTop?'<span class="badge top-pick">Destacado</span>':''}
        <span class="badge rol">${rolLabel[z.rol]||z.rol}</span>
      </div>
      <div class="shoe-name">${z.nombre}</div>
      <div class="shoe-subhead">${z.subhead}</div>
      <div class="shoe-price-tag" title="Precio de referencia — verifica en tienda">≈ ${z.precio}</div>
      <div class="metrics">
        <div class="metric-row"><span class="metric-lbl">Amortiguación</span><span class="metric-dots">${dots(z.metricas.amortiguacion)}</span></div>
        <div class="metric-row"><span class="metric-lbl">Agarre</span><span class="metric-dots">${dots(z.metricas.agarre)}</span></div>
        <div class="metric-row"><span class="metric-lbl">Estabilidad</span><span class="metric-dots">${dots(z.metricas.estabilidad)}</span></div>
      </div>
      <p class="shoe-copy">${z.copy}</p>
      <div class="tags">${(z.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('')}</div>
      ${z.link?`<a class="buy-btn" href="${z.link}" target="_blank" rel="noopener">Buscar en Amazon →</a>`:''}
    </div>`;
  }).join('');
}

function filterShoes(){
  const terreno=document.getElementById('f-terreno').value;
  const precio=document.getElementById('f-precio').value;
  const nivel=document.getElementById('f-nivel').value;
  const pAgarre=document.getElementById('p-agarre').checked;
  const pAmort=document.getElementById('p-amort').checked;
  const pEstab=document.getElementById('p-estab').checked;
  const pLigero=document.getElementById('p-ligero').checked;
  const pValor=document.getElementById('p-valor').checked;
  const hayPrioridades=pAgarre||pAmort||pEstab||pLigero||pValor;

  let lista=catalogo.filter(z=>{
    if(terreno&&!(z.terrenoKeys||[]).includes(terreno)) return false;
    if(precio==='bajo'&&z.precioNum>=2000) return false;
    if(precio==='medio'&&(z.precioNum<2000||z.precioNum>3500)) return false;
    if(precio==='alto'&&z.precioNum<=3500) return false;
    if(nivel&&!(z.nivelKeys||[]).includes(nivel)) return false;
    if(hayPrioridades){
      const ok=(pAgarre&&z.metricas.agarre>=4)||
               (pAmort&&z.metricas.amortiguacion>=4)||
               (pEstab&&z.metricas.estabilidad>=4)||
               (pLigero&&z.metricas.amortiguacion<=2)||
               (pValor&&z.precioNum<2500);
      if(!ok) return false;
    }
    return true;
  });

  lista.sort((a,b)=>
    (b.metricas.agarre+b.metricas.estabilidad)-(a.metricas.agarre+a.metricas.estabilidad)||
    a.precioNum-b.precioNum
  );
  renderShoes(lista);
}

function resetFilters(){
  ['f-terreno','f-precio','f-nivel'].forEach(id=>document.getElementById(id).value='');
  ['p-agarre','p-amort','p-estab','p-ligero','p-valor'].forEach(id=>document.getElementById(id).checked=false);
  filterShoes();
}

['f-terreno','f-precio','f-nivel'].forEach(id=>
  document.getElementById(id).addEventListener('change',filterShoes));
['p-agarre','p-amort','p-estab','p-ligero','p-valor'].forEach(id=>
  document.getElementById(id).addEventListener('change',filterShoes));

filterShoes();
</script>
